<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聲音頻率測試</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="test-body">
  <main class="test-shell">
    <section class="test-hero compact">
      <p class="site-title">115年度星燈營</p>
      <p class="eyebrow">Sound Frequency Test</p>
      <h1>聲音頻率測試</h1>
      <p class="hero-copy">先選一台目前在線上的機器，再把指定雙音音效送到那台機器的蜂鳴器播放。</p>
    </section>

    <section class="test-panel sound-panel">
      <div class="sound-device-panel">
        <p class="eyebrow">Online Devices</p>
        <h2>選擇在線機器</h2>
        <div id="soundDeviceList" class="sound-device-list"></div>
      </div>

      <div class="preset-grid">
        <button class="brand-button" type="button" id="coinSoundBtn">
          🪙 投幣音效
        </button>
        <button class="brand-button" type="button" id="starSoundBtn">
          ⭐ 星光音效
        </button>
        <button class="brand-button" type="button" id="customSoundBtn">
          🪙 鐵幣音效
        </button>
      </div>

      <div class="sound-action-row">
        <a class="ghost-button" href="/test-J2E13412">回到測試中心</a>
      </div>

      <p id="soundStatus" class="sound-status">待命中</p>
    </section>
  </main>

  <script src="/assets/sound-frequency-test.js"></script>
</body>
</html>
